name: Deploy Jekyll to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  workflow_run:
    workflows: ["Data Pipeline"]
    types: [completed]
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      skip_push_deploy: ${{ steps.pipeline_trigger.outputs.skip_push_deploy }}
    steps:
      - name: Checkout for changed-file detection
        if: github.event_name == 'push'
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect pushes that are handled by Data Pipeline
        id: pipeline_trigger
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" != "push" ]]; then
            echo "skip_push_deploy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          before="${{ github.event.before }}"
          after="${{ github.sha }}"

          if [[ "$before" =~ ^0+$ ]]; then
            changed_files="$(git diff-tree --no-commit-id --name-only -r "$after")"
          else
            changed_files="$(git diff --name-only "$before" "$after")"
          fi

          echo "Changed files:"
          printf '%s\n' "$changed_files"

          if printf '%s\n' "$changed_files" | grep -Eq '^(scripts/|\.github/workflows/pipeline\.yml$)'; then
            echo "Data Pipeline will run for this push; workflow_run will deploy the final state."
            echo "skip_push_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip_push_deploy=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: preflight
    if: |
      (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success') &&
      needs.preflight.outputs.skip_push_deploy != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # Data Pipeline commits are made by GITHUB_TOKEN, so they do not
          # trigger this workflow's push event. On workflow_run, deploy the
          # latest main branch after the pipeline has pushed updated data.
          ref: main
      
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true
      
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6
      
      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
